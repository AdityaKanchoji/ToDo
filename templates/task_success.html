<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Created Successfully</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .success-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 60px 50px;
            text-align: center;
            max-width: 480px;
            width: 100%;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .check-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.2s both;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
            }
            to {
                transform: scale(1);
            }
        }

        .check-icon svg {
            animation: draw 0.5s ease-out 0.4s both;
        }

        @keyframes draw {
            from {
                stroke-dasharray: 50;
                stroke-dashoffset: 50;
            }
            to {
                stroke-dasharray: 50;
                stroke-dashoffset: 0;
            }
        }

        h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 12px;
            font-weight: 700;
        }

        p {
            color: #666;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            flex-direction: column;
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #e1e8ed;
        }

        .btn-secondary:hover {
            background: #f8f9fa;
            border-color: #667eea;
        }

        .btn:active {
            transform: translateY(0);
        }

        @media (max-width: 480px) {
            .success-card {
                padding: 50px 30px;
            }

            h1 {
                font-size: 26px;
            }

            p {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="check-icon">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                <path d="M8 20L16 28L32 12" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        
        <h1>Task Created! 🎉</h1>
        <p>Your task has been successfully added to your dashboard.</p>
        
        <div class="button-group">
            <a href="#" class="btn btn-primary">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                    <path d="M9 4V14M4 9H14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                Add Another Task
            </a>
            <a href="#" class="btn btn-secondary">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor">
                    <path d="M3 3h12v1H3V3zm0 4h12v1H3V7zm0 4h8v1H3v-1z"/>
                </svg>
                View Dashboard
            </a>
        </div>
    </div>

    <script>
        // Auto-redirect after 5 seconds (optional)
        // setTimeout(() => {
        //     window.location.href = 'todo-dashboard.html';
        // }, 5000);
    </script>
</body>
</html>
